<!--
  ============================================================
  PET PUJA CUSTOMER — Single-file PWA
  Version: 1.0.0
  Notes:
   - 100% self-contained: HTML + CSS + JS embedded (only the
     one requested logo image is an external URL).
   - Manifest + Service Worker are injected at runtime via Blob
     URLs, keeping this a true single index.html while still
     being installable and offline-ready — GitHub Pages safe.
   - All data (profile, cart, orders, settings) persists in
     localStorage.
   - Talks to the companion "Pet Puja Management" (Owner) app
     through the same SyncBridge protocol: a hidden daily key
     auto-generated from today's date (e.g. "10JUL2026"), never
     shown in the UI, stamped on every synced payload for basic
     integrity/freshness checking. Transport defaults to
     BroadcastChannel + localStorage (same-browser/device sync)
     and is a single swappable object, ready to be pointed at
     Firebase / Supabase / REST later without any UI changes.
  ============================================================
-->

<style>
/* ============================================================
   1. DESIGN TOKENS — Retro Indian Street Food Theme
   ============================================================ */
:root{
  --brick:#7a1f1f;
  --brick-dark:#4e1414;
  --brick-light:#a83232;
  --mustard:#f2b705;
  --mustard-dark:#c98f02;
  --cream:#fff8e7;
  --black:#1a1210;
  --white:#ffffff;
  --bulb-glow:#ffd873;
  --success:#2e8b57;
  --pending:#c98f02;
  --accepted:#3a6ea5;
  --preparing:#a83232;
  --ready:#2e8b57;
  --completed:#1a7a3a;
  --cancelled:#8a1f1f;
  --radius:16px;
  --shadow-lg:0 10px 30px rgba(0,0,0,.35);
  --shadow-sm:0 3px 10px rgba(0,0,0,.25);
  --font-head:'Georgia','Times New Roman',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bg:#1a1210;
  --surface:#241412;
  --surface2:#190f0e;
  --text:#fff8e7;
  --text-dim:rgba(255,248,231,.6);
}

/* Dark mode is default theme already; "light" mode swaps to a
   warm cream surface while keeping brick/mustard accents. */
body.light-mode{
  --bg:#fbf1d9;
  --surface:#fffaf0;
  --surface2:#fff3da;
  --text:#2b1a12;
  --text-dim:rgba(43,26,18,.65);
  --black:#2b1a12;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
body{
  background-image:
    radial-gradient(circle at 10% 10%, rgba(242,183,5,.06), transparent 40%),
    radial-gradient(circle at 90% 30%, rgba(168,50,50,.10), transparent 45%),
    repeating-linear-gradient(0deg, rgba(0,0,0,.12) 0 2px, transparent 2px 42px),
    repeating-linear-gradient(90deg, rgba(0,0,0,.1) 0 2px, transparent 2px 84px);
  background-color:var(--bg);
  background-attachment:fixed;
  min-height:100vh;
  transition:background-color .3s ease,color .3s ease;
}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--mustard-dark);border-radius:4px;}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}
.hidden{display:none !important;}

/* ============================================================
   2. SPLASH SCREEN
   ============================================================ */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 20%, rgba(242,183,5,.15), transparent 55%), linear-gradient(160deg,#3a1414,#1a1210 70%);
  transition:opacity .6s ease, visibility .6s ease;
}
#splash.fade-out{opacity:0;visibility:hidden;pointer-events:none;}
#splash img{width:120px;height:120px;border-radius:28px;box-shadow:0 0 0 4px var(--mustard),var(--shadow-lg),0 0 40px rgba(242,183,5,.4);animation:popIn .8s cubic-bezier(.34,1.56,.64,1) both, floatY 3s ease-in-out infinite 1s;}
@keyframes popIn{0%{transform:scale(.4) rotate(-8deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
#splash h1{font-family:var(--font-head);color:var(--mustard);font-size:1.8rem;margin:18px 0 4px;text-shadow:0 2px 8px rgba(0,0,0,.6);animation:fadeUp .8s ease .2s both;}
#splash p{color:var(--cream);opacity:.75;font-size:.85rem;margin:0;animation:fadeUp .8s ease .35s both;}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px);}100%{opacity:1;transform:translateY(0);}}
.splash-loader{margin-top:26px;width:140px;height:4px;border-radius:4px;background:rgba(255,255,255,.15);overflow:hidden;animation:fadeUp .8s ease .5s both;}
.splash-loader::after{content:"";display:block;height:100%;width:40%;border-radius:4px;background:linear-gradient(90deg,var(--mustard-dark),var(--mustard));animation:loaderSlide 1.1s ease-in-out infinite;}
@keyframes loaderSlide{0%{transform:translateX(-100%);}50%{transform:translateX(140%);}100%{transform:translateX(140%);}}
.splash-ver{position:absolute;bottom:calc(20px + var(--safe-bottom));font-size:.7rem;color:rgba(255,248,231,.4);}

/* ============================================================
   3. APP SHELL
   ============================================================ */
#app{display:none;min-height:100vh;padding-bottom:calc(78px + var(--safe-bottom));}
#app.active{display:block;animation:appIn .45s ease both;}
@keyframes appIn{0%{opacity:0;}100%{opacity:1;}}

header.topbar{
  position:sticky;top:0;z-index:50;
  padding:calc(12px + var(--safe-top)) 16px 10px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg, var(--surface), rgba(0,0,0,0));
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(242,183,5,.18);
}
header.topbar img.logo{width:38px;height:38px;border-radius:10px;box-shadow:0 0 0 2px var(--mustard);}
header.topbar .titles{flex:1;min-width:0;}
header.topbar h1{font-family:var(--font-head);font-size:1.05rem;color:var(--mustard);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
header.topbar .sub{font-size:.68rem;color:var(--text-dim);}
.icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(242,183,5,.12);border:1px solid rgba(242,183,5,.3);
  color:var(--mustard);font-size:1.05rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .2s, transform .15s;position:relative;
}
.icon-btn:active{transform:scale(.9);}
.icon-btn .badge{
  position:absolute;top:-4px;right:-4px;background:var(--brick-light);color:#fff;
  font-size:.6rem;min-width:16px;height:16px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--bg);
}
main{padding:16px;max-width:640px;margin:0 auto;}

.page-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.page-head .back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;}
.page-head h2{font-family:var(--font-head);color:var(--mustard);font-size:1.25rem;margin:0;flex:1;}

/* ============================================================
   4. HOME PAGE
   ============================================================ */
.hero-card{
  border-radius:var(--radius);padding:20px 16px;margin-bottom:16px;text-align:center;
  background:linear-gradient(145deg, rgba(122,31,31,.5), rgba(0,0,0,.25)), var(--surface);
  border:1px solid rgba(242,183,5,.25);
  box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
}
.hero-card::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.15) 0 3px, transparent 3px 34px), repeating-linear-gradient(90deg, rgba(0,0,0,.1) 0 3px, transparent 3px 68px);
  opacity:.5;
}
.hero-card img{width:76px;height:76px;border-radius:20px;box-shadow:0 0 0 3px var(--mustard),0 0 26px rgba(242,183,5,.35);margin-bottom:10px;position:relative;animation:floatY 3.4s ease-in-out infinite;}
.hero-card h2{font-family:var(--font-head);color:var(--mustard);margin:2px 0 2px;font-size:1.3rem;position:relative;}
.hero-card p{margin:0;font-size:.8rem;color:var(--text-dim);position:relative;}
.shop-status{
  display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  background:rgba(0,0,0,.25);padding:5px 12px;border-radius:20px;font-size:.72rem;position:relative;
}
.shop-status .dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);}
.shop-status.closed .dot{background:var(--cancelled);box-shadow:0 0 6px var(--cancelled);}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.action-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;border-radius:14px;border:1px solid rgba(242,183,5,.2);
  background:var(--surface);color:var(--text);cursor:pointer;
  transition:transform .15s ease, border-color .15s ease;
}
.action-btn:active{transform:scale(.94);}
.action-btn .ic{font-size:1.4rem;}
.action-btn span.lbl{font-size:.75rem;font-weight:600;}

.conn-indicator{
  display:flex;align-items:center;gap:8px;justify-content:center;
  font-size:.72rem;color:var(--text-dim);margin-bottom:16px;
  background:var(--surface);border-radius:20px;padding:8px 12px;border:1px solid rgba(242,183,5,.14);
}
.conn-indicator .pulse{width:9px;height:9px;border-radius:50%;background:var(--success);position:relative;flex-shrink:0;}
.conn-indicator .pulse::after{
  content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--success);
  animation:pulseRing 1.6s ease-out infinite;
}
.conn-indicator.offline .pulse{background:#999;}
.conn-indicator.offline .pulse::after{border-color:#999;}
@keyframes pulseRing{0%{transform:scale(.6);opacity:.8;}100%{transform:scale(1.8);opacity:0;}}

.section-title{font-family:var(--font-head);color:var(--mustard);font-size:1.05rem;margin:0 0 10px;display:flex;align-items:center;gap:8px;}

.announce-card{
  padding:12px 14px;border-radius:12px;margin-bottom:8px;
  background:rgba(242,183,5,.08);border-left:3px solid var(--mustard);
}
.announce-card h5{margin:0 0 3px;font-size:.82rem;color:var(--mustard);}
.announce-card p{margin:0;font-size:.75rem;color:var(--text-dim);}
.announce-card small{color:var(--text-dim);font-size:.62rem;opacity:.8;}

.big-cta{
  width:100%;padding:16px;border-radius:16px;margin-top:6px;
  background:linear-gradient(135deg,var(--mustard),var(--mustard-dark));
  color:var(--black);font-weight:800;font-size:1rem;border:none;cursor:pointer;
  box-shadow:0 8px 22px rgba(242,183,5,.35);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s ease;
}
.big-cta:active{transform:scale(.97);}

/* ============================================================
   5. MENU PAGE
   ============================================================ */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid rgba(242,183,5,.25);
  border-radius:14px;padding:10px 14px;margin-bottom:14px;
}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:.9rem;}
.search-bar .ic{color:var(--mustard);}

.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-chip{
  flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:.78rem;font-weight:600;
  background:var(--surface);border:1px solid rgba(242,183,5,.2);color:var(--text-dim);cursor:pointer;
  transition:background .2s, color .2s, border-color .2s;white-space:nowrap;
}
.cat-chip.active{background:linear-gradient(135deg,var(--mustard),var(--mustard-dark));color:var(--black);border-color:transparent;}

.menu-card{
  display:flex;gap:12px;padding:12px;border-radius:14px;margin-bottom:10px;
  background:var(--surface);border:1px solid rgba(242,183,5,.14);box-shadow:var(--shadow-sm);
}
.menu-card img{width:64px;height:64px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1px solid rgba(242,183,5,.2);background:#000;}
.menu-card .info{flex:1;min-width:0;}
.menu-card .info h4{margin:0 0 3px;font-size:.9rem;color:var(--text);}
.menu-card .info p{margin:0;font-size:.7rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.menu-card .row-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.menu-card .price-tag{color:var(--mustard);font-weight:700;font-size:.88rem;}
.menu-card.unavailable{opacity:.5;}
.menu-card .unavail-badge{font-size:.62rem;background:rgba(138,31,31,.3);color:#ff9d9d;padding:2px 8px;border-radius:8px;}

.qty-ctrl{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.2);border-radius:10px;padding:3px;}
.qty-ctrl button{
  width:26px;height:26px;border-radius:8px;border:none;background:var(--mustard);color:var(--black);
  font-weight:800;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.qty-ctrl span{min-width:18px;text-align:center;font-size:.85rem;font-weight:700;}
.add-cart-btn{
  padding:7px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--mustard),var(--mustard-dark));
  color:var(--black);font-weight:700;font-size:.78rem;cursor:pointer;
}

/* Floating cart bar */
#cartBar{
  position:fixed;left:12px;right:12px;bottom:calc(84px + var(--safe-bottom));z-index:55;
  background:linear-gradient(135deg,var(--brick-light),var(--brick-dark));
  border-radius:16px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 10px 26px rgba(0,0,0,.4);color:#fff;cursor:pointer;
  animation:cartIn .3s ease both;border:1px solid rgba(242,183,5,.35);
}
@keyframes cartIn{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}
#cartBar .cb-left{display:flex;flex-direction:column;}
#cartBar .cb-left b{font-size:.95rem;}
#cartBar .cb-left span{font-size:.68rem;opacity:.85;}
#cartBar .cb-right{display:flex;align-items:center;gap:6px;font-weight:700;}

/* ============================================================
   6. CART / CHECKOUT
   ============================================================ */
.cart-item{
  display:flex;gap:10px;align-items:center;padding:10px;border-radius:12px;margin-bottom:8px;
  background:var(--surface);border:1px solid rgba(242,183,5,.14);
}
.cart-item img{width:48px;height:48px;border-radius:10px;object-fit:cover;background:#000;}
.cart-item .ci-info{flex:1;min-width:0;}
.cart-item .ci-info h5{margin:0 0 2px;font-size:.85rem;color:var(--text);}
.cart-item .ci-info span{font-size:.72rem;color:var(--mustard);}
.cart-item .remove-btn{background:none;border:none;color:#ff9d9d;font-size:1rem;cursor:pointer;padding:4px;}

.total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;font-size:1rem;font-weight:700;color:var(--text);border-top:1px dashed rgba(242,183,5,.3);margin-top:8px;}
.total-row b{color:var(--mustard);font-size:1.2rem;}

.panel{background:var(--surface);border:1px solid rgba(242,183,5,.16);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:.72rem;color:var(--mustard);margin-bottom:5px;font-weight:600;letter-spacing:.3px;}
.form-row input,.form-row textarea,.form-row select{
  width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(242,183,5,.25);
  background:rgba(0,0,0,.18);color:var(--text);font-size:.9rem;outline:none;
}
body.light-mode .form-row input,body.light-mode .form-row textarea,body.light-mode .form-row select{background:rgba(0,0,0,.04);}
.form-row textarea{resize:vertical;min-height:56px;}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--mustard);box-shadow:0 0 0 3px rgba(242,183,5,.15);}

.pay-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px;}
.pay-opt{
  padding:12px 6px;border-radius:12px;border:1px solid rgba(242,183,5,.25);background:var(--surface2);
  text-align:center;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text-dim);
  transition:border-color .2s, background .2s, color .2s;
}
.pay-opt.active{border-color:var(--mustard);background:rgba(242,183,5,.12);color:var(--mustard);}
.pay-opt .ic{display:block;font-size:1.3rem;margin-bottom:4px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:.95rem;letter-spacing:.3px;transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;user-select:none;}
.btn:active{transform:scale(.96);}
.btn-mustard{background:linear-gradient(135deg,var(--mustard),var(--mustard-dark));color:var(--black);box-shadow:0 6px 16px rgba(242,183,5,.3);}
.btn-brick{background:linear-gradient(135deg,var(--brick-light),var(--brick-dark));color:#fff;box-shadow:0 6px 16px rgba(122,31,31,.4);}
.btn-outline{background:transparent;border:1px solid rgba(242,183,5,.4);color:var(--mustard);}
.btn-ghost{background:rgba(120,120,120,.1);color:var(--text);border:1px solid rgba(120,120,120,.2);}
.btn-block{width:100%;padding:14px;border-radius:12px;margin-top:6px;}
.btn-sm{padding:8px 12px;font-size:.78rem;border-radius:9px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* ============================================================
   7. ORDER CONFIRMATION / TRACKING
   ============================================================ */
.confirm-wrap{text-align:center;padding:20px 0;}
.confirm-icon{
  width:80px;height:80px;border-radius:50%;margin:0 auto 16px;
  background:radial-gradient(circle at 30% 30%, var(--mustard), var(--mustard-dark));
  display:flex;align-items:center;justify-content:center;font-size:2.2rem;
  box-shadow:0 0 30px rgba(242,183,5,.4);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
.confirm-wrap h2{font-family:var(--font-head);color:var(--mustard);margin:0 0 6px;}
.confirm-wrap .ordno{font-size:1.6rem;font-weight:800;color:var(--text);letter-spacing:1px;margin:8px 0;}
.confirm-wrap .wait-pill{
  display:inline-flex;align-items:center;gap:6px;background:rgba(242,183,5,.12);
  padding:8px 16px;border-radius:20px;font-size:.85rem;color:var(--mustard);margin-top:6px;
}

.track-stepper{display:flex;flex-direction:column;gap:0;margin:20px 0;}
.track-step{display:flex;gap:12px;position:relative;padding-bottom:26px;}
.track-step:last-child{padding-bottom:0;}
.track-step .tdot{
  width:26px;height:26px;border-radius:50%;background:var(--surface2);border:2px solid rgba(242,183,5,.25);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;color:var(--text-dim);
  position:relative;z-index:2;
}
.track-step.done .tdot{background:var(--success);border-color:var(--success);color:#fff;}
.track-step.current .tdot{background:var(--mustard);border-color:var(--mustard);color:var(--black);box-shadow:0 0 0 6px rgba(242,183,5,.2);animation:currentPulse 1.5s ease-in-out infinite;}
@keyframes currentPulse{0%,100%{box-shadow:0 0 0 6px rgba(242,183,5,.2);}50%{box-shadow:0 0 0 10px rgba(242,183,5,.08);}}
.track-step.cancelled .tdot{background:var(--cancelled);border-color:var(--cancelled);color:#fff;}
.track-step::before{
  content:"";position:absolute;left:12px;top:26px;bottom:-26px;width:2px;background:rgba(242,183,5,.15);z-index:1;
}
.track-step:last-child::before{display:none;}
.track-step.done::before{background:var(--success);}
.track-step .tlabel{font-size:.85rem;font-weight:600;color:var(--text);padding-top:3px;}
.track-step .tsub{font-size:.68rem;color:var(--text-dim);}

/* ============================================================
   8. ORDER HISTORY / PROFILE
   ============================================================ */
.hist-card{
  border-radius:14px;padding:14px;margin-bottom:10px;background:var(--surface);border:1px solid rgba(242,183,5,.14);
}
.hist-top{display:flex;justify-content:space-between;align-items:center;}
.hist-id{font-weight:700;color:var(--mustard);font-size:.88rem;}
.hist-time{font-size:.65rem;color:var(--text-dim);}

<script>
/* ================================================================
   PET PUJA CUSTOMER — APPLICATION SCRIPT
   Modules:
     1. Config & Constants
     2. Storage Layer (DB)
     3. Sync Bridge (peer-to-peer JSON sync w/ hidden daily key)
     4. Utility helpers
     5. Splash / Boot
     6. Router / Navigation
     7. Page Renderers (Home, Menu, Cart/Checkout, Confirmation,
        Order Tracking, Orders History, Profile/Settings)
     8. Cart logic
     9. Install banner + PWA (manifest + service worker via Blob)
     10. Boot sequence
   ================================================================ */
(function(){
"use strict";

/* ============================================================
   1. CONFIG & CONSTANTS
   ============================================================ */
const APP_NAME = "Pet Puja Customer";
const APP_VERSION = "1.0.0";
const LOGO_URL = "https://i.ibb.co/GQ48tKry/Untitled475-20260710010108.png";
const STORAGE_KEY = "petpuja_customer_db_v1";
const SYNC_CHANNEL_NAME = "petpuja_sync_channel"; // must match Owner app's channel
const STATUS_LIST = ["Pending","Accepted","Preparing","Ready","Completed","Cancelled"];
const STATUS_META = {
  Pending:{ic:"⏳",sub:"Waiting for shop to accept"},
  Accepted:{ic:"👍",sub:"Order accepted by shop"},
  Preparing:{ic:"👨‍🍳",sub:"Freshly being prepared"},
  Ready:{ic:"🔔",sub:"Ready for pickup/serving"},
  Completed:{ic:"✅",sub:"Order completed. Enjoy!"},
  Cancelled:{ic:"❌",sub:"Order was cancelled"}
};
const WAIT_TIME_MIN = 10, WAIT_TIME_MAX = 25;

/* ============================================================
   2. STORAGE LAYER (simple localStorage "DB")
   ============================================================ */
const DB = {
  _data:null,
  defaultData(){
    return {
      meta:{version:APP_VERSION, createdAt:Date.now()},
      shop:{
        name:"Pet Puja Tea Stall",
        phone:"+91 60090 36270",
        location:"Kumarghat",
        mapsLink:"https://maps.google.com/?q=Kumarghat",
        isOpen:true
      },
      menu:[
        {id:"m1", name:"Masala Chai", description:"Classic spiced tea brewed fresh", category:"Tea", price:15, image:"", available:true, order:0},
        {id:"m2", name:"Samosa", description:"Crispy potato-stuffed pastry", category:"Snacks", price:20, image:"", available:true, order:1},
        {id:"m3", name:"Bun Maska", description:"Soft bun with butter", category:"Snacks", price:25, image:"", available:true, order:2}
      ],
      announcements:[],
      orders:[],          // customer's own order history
      feedback:[],
      profile:{name:"", mobile:""},
      settings:{notificationsEnabled:true, darkMode:true},
      cart:[]              // [{itemId, qty}]
    };
  },
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      this._data = raw ? JSON.parse(raw) : this.defaultData();
      // ensure new fields exist if loading an older save
      const def = this.defaultData();
      this._data = Object.assign({}, def, this._data);
      this._data.shop = Object.assign({}, def.shop, this._data.shop||{});
      this._data.settings = Object.assign({}, def.settings, this._data.settings||{});
      this._data.profile = Object.assign({}, def.profile, this._data.profile||{});
    }catch(e){
      console.warn("DB load failed, using defaults", e);
      this._data = this.defaultData();
    }
    return this._data;
  },
  save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this._data)); return true; }
    catch(e){ console.error("DB save failed", e); return false; }
  },
  get(){ return this._data; }
};

/* ============================================================
   3. SYNC BRIDGE — hidden daily key + peer-to-peer JSON sync
   ------------------------------------------------------------
   Mirrors the Owner app's SyncBridge exactly so both apps agree
   on the same daily key and payload shape. The `transport`
   object is the only piece to swap when moving to Firebase /
   Supabase / REST later.
   ============================================================ */
const SyncBridge = (function(){
  const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  function generateDailyKey(date){
    date = date || new Date();
    const dd = String(date.getDate()).padStart(2,"0");
    const mon = MONTHS[date.getMonth()];
    const yyyy = date.getFullYear();
    return `${dd}${mon}${yyyy}`; // e.g. 10JUL2026
  }
  let dailyKey = generateDailyKey();
  let bc = null;
  try{ if("BroadcastChannel" in window){ bc = new BroadcastChannel(SYNC_CHANNEL_NAME); } }catch(e){ bc = null; }

  const transport = {
    send(payload){
      try{
        if(bc) bc.postMessage(payload);
        localStorage.setItem("petpuja_sync_ping", JSON.stringify(payload));
      }catch(e){ console.warn("Sync send failed", e); }
    },
    onReceive(cb){
      if(bc){ bc.onmessage = (ev)=> cb(ev.data); }
      window.addEventListener("storage",(ev)=>{
        if(ev.key==="petpuja_sync_ping" && ev.newValue){
          try{ cb(JSON.parse(ev.newValue)); }catch(e){}
        }
      });
    }
  };

  function buildPayload(type,data){
    return { syncKey:dailyKey, type, data, ts:Date.now(), app:"Pet Puja Management", srcApp:APP_NAME, version:APP_VERSION };
  }
  function broadcast(type,data){
    transport.send(buildPayload(type,data));
  }
  function listen(handler){
    transport.onReceive((payload)=>{
      if(!payload || payload.syncKey!==dailyKey) return;
      // Accept payloads coming from either app; ignore anything
      // not carrying today's key (basic freshness/integrity check).
      handler(payload);
    });
  }
  function scheduleKeyRotation(){
    const now=new Date();
    const nextMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,1,0);
    setTimeout(()=>{ dailyKey=generateDailyKey(); scheduleKeyRotation(); }, nextMidnight-now);
  }
  scheduleKeyRotation();

  return{ getKey:()=>dailyKey, broadcast, listen, transport };
})();

/* ============================================================
   4. UTILITY HELPERS
   ============================================================ */
function uid(prefix){ return (prefix||"id")+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function escapeHtml(str){
  if(str===undefined||str===null) return "";
  return String(str).replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function fmtTime(ts){
  const d=new Date(ts);
  return d.toLocaleDateString(undefined,{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
}
function toast(msg,ms){
  const wrap=document.getElementById("toastWrap");
  const el=document.createElement("div");
  el.className="toast"; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), ms||3000);
}
function openModal(html){
  const root=document.getElementById("modalRoot");
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.innerHTML=`<div class="modal-sheet">${html}</div>`;
  overlay.addEventListener("click",(e)=>{ if(e.target===overlay) closeModal(); });
  root.innerHTML=""; root.appendChild(overlay);
  return overlay;
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }

/* ============================================================
   5. SPLASH / BOOT-IN
   ============================================================ */
function initSplashThenHome(){
  const splash=document.getElementById("splash");
  setTimeout(()=>{
    splash.classList.add("fade-out");
    setTimeout(()=>{
      splash.style.display="none";
      showApp();
    },600);
  },1500);
}

function showApp(){
  applyTheme();
  document.getElementById("app").classList.add("active");
  applyShopBranding();
  Router.go("home");
  startSyncListeners();
  requestMenuFromOwner();
  updateCartBadge();
  updateOrdersNavBadge();
}

/* ============================================================
   6. ROUTER / NAVIGATION
   ============================================================ */
const Router = {
  current:"home",
  go(page, params){
    this.current = page;
    this.params = params||{};
    document.querySelectorAll(".nav-btn").forEach(b=>{
      b.classList.toggle("active", b.dataset.page===page);
    });
    const main=document.getElementById("mainContent");
    main.innerHTML="";
    main.appendChild(Pages[page](this.params));
    window.scrollTo({top:0,behavior:"smooth"});
    renderCartBar();
  }
};
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.addEventListener("click", ()=> Router.go(btn.dataset.page));
});
document.getElementById("cartIconBtn").addEventListener("click", ()=> Router.go("cart"));

function applyShopBranding(){
  const shop = DB.get().shop;
  document.getElementById("shopNameHeader").textContent = shop.name || APP_NAME;
  document.getElementById("topSubText").textContent = shop.isOpen ? "🟢 Open now" : "🔴 Closed now";
}
function applyTheme(){
  const dark = DB.get().settings.darkMode;
  document.body.classList.toggle("light-mode", !dark);
}

/* ============================================================
   7. PAGE RENDERERS
   ============================================================ */
const Pages = {};
function pageEl(){ return document.createElement("div"); }
function subPageHeader(title){
  const wrap=document.createElement("div");
  wrap.className="page-head";
  wrap.innerHTML=`<button class="back-btn">←</button><h2>${title}</h2>`;
  wrap.querySelector(".back-btn").addEventListener("click", ()=> Router.go("home"));
  return wrap;
}

/* ---------------- HOME PAGE ---------------- */
Pages.home = function(){
  const el = pageEl();
  const data = DB.get();
  const shop = data.shop;

  el.innerHTML = `
    <div class="hero-card">
      <img src="${LOGO_URL}" alt="logo">
      <h2>Namaste! 🙏</h2>
      <p>Welcome to ${escapeHtml(shop.name)}</p>
      <div class="shop-status ${shop.isOpen?'':'closed'}">
        <span class="dot"></span> ${shop.isOpen?"Open Now":"Currently Closed"}
      </div>
    </div>

    <div class="action-row">
      <button class="action-btn" id="callShopBtn"><span class="ic">📞</span><span class="lbl">Call Shop</span></button>
      <button class="action-btn" id="mapsShopBtn"><span class="ic">📍</span><span class="lbl">Get Directions</span></button>
    </div>

    <div class="conn-indicator" id="connIndicator">
      <span class="pulse"></span>
      <span id="connText">Connected • Live menu sync</span>
    </div>

    <div id="announcementsWrap"></div>

    <button class="big-cta" id="viewMenuBtn">🍽️ View Menu & Order</button>
  `;

  el.querySelector("#callShopBtn").addEventListener("click", ()=>{
    window.location.href = `tel:${shop.phone.replace(/\s/g,"")}`;
  });
  el.querySelector("#mapsShopBtn").addEventListener("click", ()=>{
    window.open(shop.mapsLink, "_blank");
  });
  el.querySelector("#viewMenuBtn").addEventListener("click", ()=> Router.go("menu"));

  // Announcements
  const annWrap = el.querySelector("#announcementsWrap");
  if(data.announcements.length){
    const title = document.createElement("div");
    title.className="section-title";
    title.innerHTML=`📢 Announcements`;
    annWrap.appendChild(title);
    [...data.announcements].sort((a,b)=>b.createdAt-a.createdAt).slice(0,5).forEach(a=>{
      const card=document.createElement("div");
      card.className="announce-card";
      card.innerHTML=`<h5>${escapeHtml(a.title)}</h5><p>${escapeHtml(a.message)}</p><small>${fmtTime(a.createdAt)}</small>`;
      annWrap.appendChild(card);
    });
  }

  updateConnIndicator(el.querySelector("#connIndicator"), el.querySelector("#connText"));
  return el;
};

function updateConnIndicator(indicatorEl, textEl){
  if(!indicatorEl) return;
  const online = navigator.onLine;
  indicatorEl.classList.toggle("offline", !online);
  textEl.textContent = online ? "Connected • Live menu sync" : "Offline • showing saved menu";
}

/* ---------------- MENU PAGE ---------------- */
Pages.menu = function(){
  const el = pageEl();
  el.appendChild(subPageHeader("🍽️ Menu"));

  const searchWrap = document.createElement("div");
  searchWrap.className="search-bar";
  searchWrap.innerHTML = `<span class="ic">🔍</span><input type="text" id="menuSearch" placeholder="Search for tea, samosa...">`;
  el.appendChild(searchWrap);

  const data = DB.get();
  const cats = ["All", ...new Set(data.menu.map(m=>m.category))];
  const catScroll = document.createElement("div");
  catScroll.className="cat-scroll";
  cats.forEach(c=>{
    const chip=document.createElement("button");
    chip.className="cat-chip"+(c==="All"?" active":"");
    chip.textContent=c;
    chip.dataset.cat=c;
    catScroll.appendChild(chip);
  });
  el.appendChild(catScroll);

  const list = document.createElement("div");
  list.id="menuListWrap";
  el.appendChild(list);

  let activeCat="All", query="";
  function refresh(){
    renderMenuItems(list, activeCat, query);
  }
  searchWrap.querySelector("#menuSearch").addEventListener("input",(e)=>{
    query = e.target.value.trim().toLowerCase();
    refresh();
  });
  catScroll.addEventListener("click",(e)=>{
    const chip = e.target.closest(".cat-chip");
    if(!chip) return;
    catScroll.querySelectorAll(".cat-chip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    activeCat = chip.dataset.cat;
    refresh();
  });

  refresh();
  return el;
};

function renderMenuItems(container, cat, query){
  const data = DB.get();
  let items = [...data.menu].sort((a,b)=>a.order-b.order);
  if(cat && cat!=="All") items = items.filter(i=>i.category===cat);
  if(query) items = items.filter(i=> i.name.toLowerCase().includes(query) || (i.description||"").toLowerCase().includes(query));
  container.innerHTML="";
  if(!items.length){
    container.innerHTML = `<div class="empty-state"><div class="em">🍽️</div><p>No items found.</p></div>`;
    return;
  }
  items.forEach(item=>{
    const card = document.createElement("div");
    card.className = "menu-card"+(item.available?"":" unavailable");
    const inCart = data.cart.find(c=>c.itemId===item.id);
    const qty = inCart?inCart.qty:0;
    card.innerHTML = `
      ${item.image?`<img src="${escapeHtml(item.image)}" alt="">`:`<div style="width:64px;height:64px;border-radius:12px;background:rgba(242,183,5,.12);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">🍵</div>`}
      <div class="info">
        <h4>${escapeHtml(item.name)}</h4>
        <p>${escapeHtml(item.description||"")}</p>
        <div class="row-bottom">
          <span class="price-tag">₹${item.price}</span>
          ${item.available ? `<div class="cart-controls" data-id="${item.id}">
            ${qty>0 ? `
              <div class="qty-ctrl">
                <button class="minus-b">−</button>
                <span>${qty}</span>
                <button class="plus-b">+</button>
              </div>
            ` : `<button class="add-cart-btn">+ Add</button>`}
          </div>` : `<span class="unavail-badge">Unavailable</span>`}
        </div>
      </div>
    `;
    if(item.available){
      const controls = card.querySelector(".cart-controls");
      if(qty>0){
        controls.querySelector(".plus-b").addEventListener("click", ()=>{ changeCartQty(item.id, 1); renderMenuItems(container, currentCatFilter(container), currentQuery(container)); });
        controls.querySelector(".minus-b").addEventListener("click", ()=>{ changeCartQty(item.id, -1); renderMenuItems(container, currentCatFilter(container), currentQuery(container)); });
      }else{
        controls.querySelector(".add-cart-btn").addEventListener("click", ()=>{
          changeCartQty(item.id, 1);
          toast(`${item.name} added to cart 🛒`);
          renderMenuItems(container, currentCatFilter(container), currentQuery(container));
        });
      }
    }
    container.appendChild(card);
  });
}
// Helpers to preserve current filter state when re-rendering after qty change
function currentCatFilter(container){
  const scroll = container.parentElement.querySelector(".cat-scroll");
  const active = scroll ? scroll.querySelector(".cat-chip.active") : null;
  return active ? active.dataset.cat : "All";
}
function currentQuery(container){
  const search = container.parentElement.querySelector("#menuSearch");
  return search ? search.value.trim().toLowerCase() : "";
}

/* ============================================================
   8. CART LOGIC
   ============================================================ */
function changeCartQty(itemId, delta){
  const data = DB.get();
  let entry = data.cart.find(c=>c.itemId===itemId);
  if(!entry){
    if(delta>0){ data.cart.push({itemId, qty:1}); }
  }else{
    entry.qty += delta;
    if(entry.qty<=0){ data.cart = data.cart.filter(c=>c.itemId!==itemId); }
  }
  DB.save();
  updateCartBadge();
  renderCartBar();
}

function getCartDetailed(){
  const data = DB.get();
  return data.cart.map(c=>{
    const item = data.menu.find(m=>m.id===c.itemId);
    if(!item) return null;
    return { ...item, qty:c.qty, lineTotal: item.price*c.qty };
  }).filter(Boolean);
}
function cartTotal(){
  return getCartDetailed().reduce((sum,i)=>sum+i.lineTotal,0);
}
function cartCount(){
  return DB.get().cart.reduce((sum,c)=>sum+c.qty,0);
}
function updateCartBadge(){
  const badge=document.getElementById("cartBadge");
  const count=cartCount();
  if(count>0){ badge.textContent=count; badge.classList.remove("hidden"); }
  else{ badge.classList.add("hidden"); }
}

function renderCartBar(){
  const existing = document.getElementById("cartBar");
  if(existing) existing.remove();
  if(Router.current==="cart" || Router.current==="checkout") return;
  const count = cartCount();
  if(count<=0) return;
  const bar = document.createElement("div");
  bar.id="cartBar";
  bar.innerHTML = `
    <div class="cb-left"><b>${count} item${count>1?'s':''} in cart</b><span>Tap to view</span></div>
    <div class="cb-right">₹${cartTotal()} →</div>
  `;
  bar.addEventListener("click", ()=> Router.go("cart"));
  document.body.appendChild(bar);
}

function buildTrackPanelHTML(order){
  const activeSteps = STATUS_LIST.filter(s=>s!=="Cancelled");
  const isCancelled = order.status==="Cancelled";
  const currentIdx = activeSteps.indexOf(order.status);

  let stepsHtml = "";
  if(isCancelled){
    stepsHtml = `
      <div class="track-step cancelled">
        <div class="tdot">❌</div>
        <div><div class="tlabel">Order Cancelled</div><div class="tsub">${STATUS_META.Cancelled.sub}</div></div>
      </div>
    `;
  }else{
    stepsHtml = activeSteps.map((s,i)=>{
      const done = i<currentIdx;
      const current = i===currentIdx;
      const cls = done?"done":current?"current":"";
      const icon = done?"✓":STATUS_META[s].ic;
      return `
        <div class="track-step ${cls}">
          <div class="tdot">${icon}</div>
          <div><div class="tlabel">${s}</div><div class="tsub">${STATUS_META[s].sub}</div></div>
        </div>
      `;
    }).join("");
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div>
        <div style="font-weight:700;color:var(--mustard);font-size:1rem;">#${order.orderNumber}</div>
        <div style="font-size:.68rem;color:var(--text-dim);">${fmtTime(order.createdAt)}</div>
      </div>
      <span class="status-badge status-${order.status}">${order.status}</span>
    </div>
    <div class="track-stepper">${stepsHtml}</div>
    <div style="font-size:.78rem;color:var(--text-dim);border-top:1px dashed rgba(242,183,5,.25);padding-top:10px;">
      ${order.items.map(i=>`${escapeHtml(i.name)} × ${i.qty}`).join(", ")}
      <br><b style="color:var(--mustard);">Total: ₹${order.total}</b> • ${escapeHtml(order.paymentMethod)}
    </div>
  `;
}

function reorderItems(order){
  const data = DB.get();
  let addedCount = 0;
  order.items.forEach(oi=>{
    const menuItem = data.menu.find(m=>m.id===oi.itemId);
    if(menuItem && menuItem.available){
      let entry = data.cart.find(c=>c.itemId===menuItem.id);
      if(entry) entry.qty += oi.qty;
      else data.cart.push({itemId:menuItem.id, qty:oi.qty});
      addedCount++;
    }
  });
  DB.save();
  updateCartBadge();
  if(addedCount>0){
    toast("Items added to cart from previous order 🔁");
    Router.go("cart");
  }else{
    toast("Those items are no longer available");
  }
}

function updateOrdersNavBadge(){
  const data = DB.get();
  const active = data.orders.filter(o=>["Pending","Accepted","Preparing","Ready"].includes(o.status)).length;
  const badge = document.getElementById("ordersNavBadge");
  if(active>0){ badge.textContent=active; badge.classList.remove("hidden"); }
  else{ badge.classList.add("hidden"); }
}

/* ============================================================
   9. SYNC LISTENERS — receive updates from Owner app
   ============================================================ */
function requestMenuFromOwner(){
  // Announce presence; Owner app can optionally respond by
  // re-broadcasting current menu/shop state on this event.
  SyncBridge.broadcast("customer_ready", {ts:Date.now()});
}

function startSyncListeners(){
  SyncBridge.listen((payload)=>{
    const data = DB.get();
    switch(payload.type){
      case "menu_update":
        data.menu = payload.data;
        DB.save();
        if(Router.current==="menu") Router.go("menu");
        toast("Menu updated 🍽️");
        break;
      case "shop_update":
        Object.assign(data.shop, payload.data);
        DB.save();
        applyShopBranding();
        if(Router.current==="home") Router.go("home");
        break;
      case "order_update":{
        const incoming = payload.data;
        const local = data.orders.find(o=>o.id===incoming.id || o.orderNumber===incoming.orderNumber);
        if(local && local.status !== incoming.status){
          const oldStatus = local.status;
          local.status = incoming.status;
          DB.save();
          updateOrdersNavBadge();
          if(data.settings.notificationsEnabled){
            showStatusPopup(local);
          }
          if(Router.current==="track" && Router.params && Router.params.orderId===local.id){
            Router.go("track",{orderId:local.id});
          }
          if(Router.current==="orders") Router.go("orders");
        }
        break;
      }
      case "announcement":
        data.announcements.push(payload.data);
        DB.save();
        if(data.settings.notificationsEnabled){
          showAnnouncementPopup(payload.data);
        }
        if(Router.current==="home") Router.go("home");
        break;
      default:
        break;
    }
  });
  updateConnIndicatorGlobal();
  setInterval(updateConnIndicatorGlobal, 5000);
}

function updateConnIndicatorGlobal(){
  if(Router.current==="home"){
    const indicatorEl = document.getElementById("connIndicator");
    const textEl = document.getElementById("connText");
    updateConnIndicator(indicatorEl, textEl);
  }
}
window.addEventListener("online", updateConnIndicatorGlobal);
window.addEventListener("offline", updateConnIndicatorGlobal);

function showStatusPopup(order){
  const meta = STATUS_META[order.status] || {ic:"🔔", sub:""};
  const popup = document.createElement("div");
  popup.className="status-popup";
  popup.innerHTML = `
    <h4>${meta.ic} Order #${order.orderNumber} — ${order.status}</h4>
    <p>${meta.sub}</p>
  `;
  document.body.appendChild(popup);
  popup.addEventListener("click", ()=>{ Router.go("track",{orderId:order.id}); popup.remove(); });
  setTimeout(()=> popup.remove(), 5000);
}

function showAnnouncementPopup(ann){
  const popup = document.createElement("div");
  popup.className="status-popup";
  popup.innerHTML = `<h4>📢 ${escapeHtml(ann.title)}</h4><p>${escapeHtml(ann.message)}</p>`;
  document.body.appendChild(popup);
  popup.addEventListener("click", ()=>{ Router.go("home"); popup.remove(); });
  setTimeout(()=> popup.remove(), 5000);
}

/* ============================================================
   10. INSTALL BANNER + PWA (manifest & service worker via Blob)
   ============================================================ */
let deferredPrompt = null;
const installBanner = document.getElementById("installBanner");
let isInstalled = false;

function checkStandalone(){
  isInstalled = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  return isInstalled;
}
function showInstallBannerIfNeeded(){
  if(checkStandalone()) return;
  installBanner.classList.remove("hidden");
}
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt = e;
  showInstallBannerIfNeeded();
});
installBanner.addEventListener("click", async (e)=>{
  if(e.target.id==="installBannerClose") return;
  if(deferredPrompt){
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    if(choice.outcome==="accepted"){
      toast("Installing Pet Puja... 📲");
      installBanner.classList.add("hidden");
    }
    deferredPrompt = null;
  }else{
    toast("Use your browser menu → 'Add to Home Screen' to install");
  }
});
document.getElementById("installBannerClose").addEventListener("click",(e)=>{
  e.stopPropagation();
  installBanner.classList.add("hidden");
  setTimeout(()=>{ if(!checkStandalone()) installBanner.classList.remove("hidden"); }, 20000);
});
window.addEventListener("appinstalled", ()=>{
  isInstalled = true;
  installBanner.classList.add("hidden");
  toast("Pet Puja installed successfully! 🎉");
});

function registerPWA(){
  const manifest = {
    name: APP_NAME,
    short_name: "Pet Puja",
    description: "Order tasty food from your favorite tea stall",
    start_url: ".",
    scope: ".",
    display: "standalone",
    background_color: "#1a1210",
    theme_color: "#7a1f1f",
    orientation: "portrait-primary",
    icons: [
      {src: LOGO_URL, sizes:"192x192", type:"image/png", purpose:"any maskable"},
      {src: LOGO_URL, sizes:"512x512", type:"image/png", purpose:"any maskable"}
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
  const manifestURL = URL.createObjectURL(manifestBlob);
  const link = document.createElement("link");
  link.rel="manifest"; link.href=manifestURL;
  document.head.appendChild(link);

  if("serviceWorker" in navigator){
    const swSource = `
      const CACHE_NAME = "petpuja-customer-cache-v1";
      self.addEventListener("install",(e)=>{ self.skipWaiting(); });
      self.addEventListener("activate",(e)=>{ e.waitUntil(self.clients.claim()); });
      self.addEventListener("fetch",(e)=>{
        if(e.request.method !== "GET") return;
        e.respondWith(
          caches.open(CACHE_NAME).then(async (cache)=>{
            const cached = await cache.match(e.request);
            const fetchPromise = fetch(e.request).then((res)=>{
              if(res && res.status===200){ cache.put(e.request, res.clone()); }
              return res;
            }).catch(()=> cached);
            return cached || fetchPromise;
          })
        );
      });
    `;
    const swBlob = new Blob([swSource], {type:"application/javascript"});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).catch(err=> console.warn("SW registration failed", err));
  }
}

/* ============================================================
   11. BOOT SEQUENCE
   ============================================================ */
function boot(){
  DB.load();
  registerPWA();
  initSplashThenHome();

  setInterval(()=>{
    if(checkStandalone()) installBanner.classList.add("hidden");
  }, 4000);

  // Dev/demo hooks for testing sync from console:
  //   window.__petpujaCustomer.simulateStatusChange(orderId, "Accepted")
  //   window.__petpujaCustomer.simulateAnnouncement("Title","Message")
  window.__petpujaCustomer = {
    getSyncKey: ()=> SyncBridge.getKey(), // internal/hidden — debugging only
    exportData: ()=> DB.get(),
    simulateStatusChange: (orderId, status)=>{
      const data = DB.get();
      const order = data.orders.find(o=>o.id===orderId);
      if(order){ SyncBridge.broadcast("order_update", {...order, status}); }
    },
    simulateAnnouncement: (title,message)=>{
      SyncBridge.broadcast("announcement", {id:uid("n"), title, message, createdAt:Date.now()});
    }
  };
}

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded", boot);
}else{
  boot();
}

})();
</script>
